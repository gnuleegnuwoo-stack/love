<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Question</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:150px;
    background:#ffe6f0;
    overflow:hidden;
}

button{
    padding:10px 20px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

#yesBtn{
    background:#ff4d6d;
    color:white;
    transition: font-size 0.2s;
}

#noBtn{
    background:#ddd;
    position:relative;
    transition: transform 0.15s ease;
}

#result{
    margin-top:20px;
    font-size:30px;
    color:red;
}
</style>
</head>

<body>

<h1>사랑해요 ❤️</h1>

<button id="yesBtn" onclick="yesAnswer()">네</button>
<button id="noBtn" onmouseover="runAway()" onclick="noAnswer()">아니요</button>

<div id="result"></div>

<script>
let size = 20;
let yesSize = 20;
let noClicks = 0;

function yesAnswer(){
    document.getElementById("result").innerHTML = "정답이에요 ❤️";
}

function noAnswer(){
    noClicks++;
    size += 10;
    yesSize += 8;
    document.getElementById("noBtn").style.fontSize = size + "px";
    document.getElementById("yesBtn").style.fontSize = yesSize + "px";
    document.getElementById("result").innerHTML = "아니라고요? 😢 (" + noClicks + ")";
    runAway();
}

function runAway(){
    const btn = document.getElementById("noBtn");
    const maxX = window.innerWidth - btn.offsetWidth - 40;
    const maxY = window.innerHeight - btn.offsetHeight - 40;
    const randX = Math.random() * maxX;
    const randY = Math.random() * maxY;

    btn.style.position = "fixed";
    btn.style.left = randX + "px";
    btn.style.top = randY + "px";
}
</script>

</body>
</html>
